<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Arrow Dash — Space Gameplay (Level 14)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Inter:wght@400;500&family=Space+Grotesk:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0A0B1E;
    --surface: #111328;
    --surface-hi: #1A1C3A;
    --grid-bg: #0E1030;
    --grid-line: #1E2255;
    --text: #E8EDF2;
    --text-dim: #7B7FA3;
    --gold: #FFD666;
    --emerald: #4AE68A;
    --cyan: #5CE0D8;
    --coral: #FF6B9D;
    --violet: #A78BFA;
    --red: #FF6B6B;
    --amber: #FFAB40;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    width: 393px;
    height: 852px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }

  /* Stars */
  .stars { position: absolute; inset: 0; z-index: 0; }
  @keyframes twinkle {
    0%, 100% { opacity: 0.1; }
    50% { opacity: 0.6; }
  }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle 4s ease-in-out infinite;
  }

  /* Nebula */
  .nebula {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    z-index: 0;
  }
  .neb-1 { top: 20px; left: -80px; width: 250px; height: 250px; background: var(--violet); opacity: 0.05; }
  .neb-2 { bottom: 100px; right: -60px; width: 200px; height: 200px; background: var(--cyan); opacity: 0.03; }

  /* Distant planet */
  .planet {
    position: absolute;
    bottom: 120px;
    right: 20px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #2A2C50 0%, #151736 100%);
    opacity: 0.3;
    z-index: 0;
    box-shadow: 0 0 20px rgba(167, 139, 250, 0.05);
  }
  .planet::after {
    content: '';
    position: absolute;
    top: 50%;
    left: -8px;
    right: -8px;
    height: 2px;
    background: linear-gradient(to right, transparent, rgba(167, 139, 250, 0.15), transparent);
    transform: rotate(-15deg);
    border-radius: 50%;
  }

  /* World label */
  .world-label {
    position: absolute;
    top: 48px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Quicksand', sans-serif;
    font-size: 10px;
    color: var(--text-dim);
    opacity: 0.5;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 20;
  }

  /* Top HUD */
  .top-hud {
    position: relative;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 62px 20px 14px;
    background: linear-gradient(to bottom, rgba(17, 19, 40, 0.95) 0%, rgba(17, 19, 40, 0.6) 80%, transparent 100%);
    border-radius: 0 0 20px 20px;
  }

  .hud-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .icon-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }

  .level-label {
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 18px;
  }

  .hearts {
    display: flex;
    gap: 6px;
  }
  .heart { font-size: 20px; line-height: 1; }
  .heart.active { color: var(--red); text-shadow: 0 0 8px rgba(255, 107, 107, 0.4); }
  .heart.empty { color: #2A2C50; }

  svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* Puzzle Grid */
  .grid-container {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: center;
    margin-top: 40px;
    padding: 0 20px;
  }

  .puzzle-grid {
    width: 340px;
    height: 340px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(6, 1fr);
    background: var(--grid-bg);
    border-radius: 16px;
    padding: 6px;
    gap: 2px;
    position: relative;
    border: 1px solid rgba(30, 34, 85, 0.8);
  }

  /* Holographic border shimmer */
  @keyframes holo-border {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .puzzle-grid::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 18px;
    background: linear-gradient(90deg, var(--violet), var(--cyan), var(--gold), var(--coral), var(--violet));
    background-size: 300% 100%;
    animation: holo-border 6s linear infinite;
    opacity: 0.15;
    z-index: -1;
  }

  .puzzle-grid::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    box-shadow: 0 0 40px 4px rgba(167, 139, 250, 0.04), 0 0 80px 8px rgba(92, 224, 216, 0.02);
    pointer-events: none;
  }

  .cell {
    background: rgba(10, 11, 30, 0.6);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .cell.empty {
    background: rgba(10, 11, 30, 0.3);
  }

  /* Tiny star inside empty cells */
  .cell.empty::after {
    content: '';
    width: 1px; height: 1px;
    background: white;
    border-radius: 50%;
    opacity: 0.15;
    position: absolute;
  }

  /* Arrow energy beams in grid */
  @keyframes beam-breathe {
    0%, 100% { opacity: 0.85; }
    50% { opacity: 1; }
  }

  .arrow {
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    animation: beam-breathe 3s ease-in-out infinite;
  }

  .arrow .beam-line {
    position: absolute;
    width: 24px; height: 4px;
    border-radius: 2px;
  }

  .arrow .orb-dot {
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 50%;
  }

  .arrow .trail-dot {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    opacity: 0.3;
  }

  /* Directions */
  .arrow.right .beam-line { transform: none; }
  .arrow.right .orb-dot { right: 8px; }
  .arrow.right .trail-dot { left: 8px; }

  .arrow.left .beam-line { transform: rotate(180deg); }
  .arrow.left .orb-dot { left: 8px; }
  .arrow.left .trail-dot { right: 8px; }

  .arrow.up .beam-line { transform: rotate(-90deg); width: 4px; height: 24px; }
  .arrow.up .orb-dot { top: 8px; }
  .arrow.up .trail-dot { bottom: 8px; }

  .arrow.down .beam-line { transform: rotate(90deg); width: 4px; height: 24px; }
  .arrow.down .orb-dot { bottom: 8px; }
  .arrow.down .trail-dot { top: 8px; }

  /* Color glow */
  .arrow.gold .beam-line { background: var(--gold); box-shadow: 0 0 8px rgba(255, 214, 102, 0.4); }
  .arrow.gold .orb-dot { background: var(--gold); box-shadow: 0 0 12px 4px rgba(255, 214, 102, 0.4); }
  .arrow.gold .trail-dot { background: var(--gold); box-shadow: 0 0 4px rgba(255, 214, 102, 0.3); }

  .arrow.emerald .beam-line { background: var(--emerald); box-shadow: 0 0 8px rgba(74, 230, 138, 0.4); }
  .arrow.emerald .orb-dot { background: var(--emerald); box-shadow: 0 0 12px 4px rgba(74, 230, 138, 0.4); }
  .arrow.emerald .trail-dot { background: var(--emerald); box-shadow: 0 0 4px rgba(74, 230, 138, 0.3); }

  .arrow.coral .beam-line { background: var(--coral); box-shadow: 0 0 8px rgba(255, 107, 157, 0.4); }
  .arrow.coral .orb-dot { background: var(--coral); box-shadow: 0 0 12px 4px rgba(255, 107, 157, 0.4); }
  .arrow.coral .trail-dot { background: var(--coral); box-shadow: 0 0 4px rgba(255, 107, 157, 0.3); }

  .arrow.cyan .beam-line { background: var(--cyan); box-shadow: 0 0 8px rgba(92, 224, 216, 0.4); }
  .arrow.cyan .orb-dot { background: var(--cyan); box-shadow: 0 0 12px 4px rgba(92, 224, 216, 0.4); }
  .arrow.cyan .trail-dot { background: var(--cyan); box-shadow: 0 0 4px rgba(92, 224, 216, 0.3); }

  /* Tappable highlight */
  .cell.tappable {
    background: rgba(255, 214, 102, 0.05);
    border: 1px solid rgba(255, 214, 102, 0.12);
  }
  .cell.tappable .arrow { animation: beam-breathe 1.5s ease-in-out infinite; }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 16px 40px 40px;
    background: linear-gradient(to top, rgba(17, 19, 40, 0.95) 0%, rgba(17, 19, 40, 0.6) 80%, transparent 100%);
    border-radius: 20px 20px 0 0;
  }

  .action-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: transform 0.2s;
  }
  .action-btn:hover { transform: scale(1.1); }

  .action-btn.hint { border: 2px solid var(--amber); box-shadow: 0 0 10px rgba(255, 171, 64, 0.15); }
  .action-btn.hint svg { color: var(--amber); }
  .action-btn.undo { border: 2px solid var(--text); box-shadow: 0 0 8px rgba(232, 237, 242, 0.06); }
  .action-btn.undo svg { color: var(--text); }
  .action-btn.zoom { border: 2px solid var(--text-dim); box-shadow: 0 0 6px rgba(123, 127, 163, 0.06); }
  .action-btn.zoom svg { color: var(--text-dim); }

  .badge {
    position: absolute;
    top: -4px; right: -4px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    font-weight: 500;
  }
  .action-btn.hint .badge { border: 1.5px solid var(--amber); color: var(--amber); }
  .action-btn.undo .badge { border: 1.5px solid var(--text); color: var(--text); }

  .action-label {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 6px;
    text-align: center;
  }
  .action-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
</style>
</head>
<body>

<div class="stars">
  <div class="star" style="top:5%;left:15%;animation-delay:0s"></div>
  <div class="star" style="top:12%;left:50%;animation-delay:1.5s"></div>
  <div class="star" style="top:18%;right:22%;animation-delay:0.8s"></div>
  <div class="star" style="top:25%;left:72%;animation-delay:2.2s"></div>
  <div class="star" style="top:32%;left:8%;animation-delay:0.3s"></div>
  <div class="star" style="top:55%;right:12%;animation-delay:1.1s"></div>
  <div class="star" style="top:65%;left:30%;animation-delay:2.6s"></div>
  <div class="star" style="top:78%;right:40%;animation-delay:0.6s"></div>
  <div class="star" style="top:85%;left:65%;animation-delay:1.8s;width:1px;height:1px"></div>
  <div class="star" style="top:42%;left:90%;animation-delay:2s;width:1px;height:1px"></div>
</div>

<div class="nebula neb-1"></div>
<div class="nebula neb-2"></div>
<div class="planet"></div>

<div class="world-label">Nebula Sector</div>

<div class="top-hud">
  <div class="hud-left">
    <div class="icon-btn">
      <svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
    </div>
    <div class="level-label">Level 14</div>
  </div>
  <div class="hearts">
    <span class="heart active">&hearts;</span>
    <span class="heart active">&hearts;</span>
    <span class="heart empty">&hearts;</span>
  </div>
  <div class="icon-btn">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </div>
</div>

<div class="grid-container">
  <div class="puzzle-grid">
    <!-- Row 1 -->
    <div class="cell"><div class="arrow gold right"><div class="trail-dot"></div><div class="beam-line"></div><div class="orb-dot"></div></div></div>
    <div class="cell empty"></div>
    <div class="cell"><div class="arrow emerald down"><div class="trail-dot"></div><div class="beam-line"></div><div class="orb-dot"></div></div></div>
    <div class="cell empty"></div>
    <div class="cell empty"></div>
    <div class="cell tappable"><div class="arrow gold right"><div class="trail-dot"></div><div class="beam-line"></div><div class="orb-dot"></div></div></div>

    <!-- Row 2 -->
    <div class="cell empty"></div>
    <div class="cell"><div class="arrow coral left"><div class="trail-dot"></div><div class="beam-line"></div><div class="orb-dot"></div></div></div>
    <div class="cell empty"></div>
    <div class="cell"><div class="arrow cyan up"><div class="trail-dot"></div><div class="beam-line"></div><div class="orb-dot"></div></div></div>
    <div class="cell"><div class="arrow gold down"><div class="trail-dot"></div><div class="beam-line"></div><div class="orb-dot"></div></div></div>
    <div class="cell empty"></div>

    <!-- Row 3 -->
    <div class="cell"><div class="arrow emerald right"><div class="trail-dot"></div><div class="beam-line"></div><div class="orb-dot"></div></div></div>
    <div class="cell empty"></div>
    <div class="cell empty"></div>
    <div class="cell"><div class="arrow coral up"><div class="trail-dot"></div><div class="beam-line"></div><div class="orb-dot"></div></div></div>
    <div class="cell empty"></div>
    <div class="cell"><div class="arrow cyan left"><div class="trail-dot"></div><div class="beam-line"></div><div class="orb-dot"></div></div></div>

    <!-- Row 4-6: empty -->
    <div class="cell empty"></div><div class="cell empty"></div><div class="cell empty"></div><div class="cell empty"></div><div class="cell empty"></div><div class="cell empty"></div>
    <div class="cell empty"></div><div class="cell empty"></div><div class="cell empty"></div><div class="cell empty"></div><div class="cell empty"></div><div class="cell empty"></div>
    <div class="cell empty"></div><div class="cell empty"></div><div class="cell empty"></div><div class="cell empty"></div><div class="cell empty"></div><div class="cell empty"></div>
  </div>
</div>

<div class="bottom-bar">
  <div class="action-wrapper">
    <div class="action-btn hint">
      <svg viewBox="0 0 24 24"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 1 4 12.7V17a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1H10a1 1 0 0 1-1-1v-2.3A7 7 0 0 1 12 2z"/></svg>
      <div class="badge">2</div>
    </div>
    <div class="action-label">Hint</div>
  </div>
  <div class="action-wrapper">
    <div class="action-btn undo">
      <svg viewBox="0 0 24 24"><path d="M3 7v6h6M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6.69 3L3 13"/></svg>

  <div class="action-wrapper">
    <div class="action-btn zoom">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35M8 11h6M11 8v6"/></svg>
    </div>
    <div class="action-label">Zoom</div>
  </div>
</div>

</body>
</html>
