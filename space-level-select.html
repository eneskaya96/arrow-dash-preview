<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Arrow Dash — Space Level Select</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Inter:wght@400;500&family=Space+Grotesk:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0A0B1E;
    --surface: #111328;
    --text: #E8EDF2;
    --text-dim: #7B7FA3;
    --gold: #FFD666;
    --emerald: #4AE68A;
    --cyan: #5CE0D8;
    --violet: #A78BFA;
    --locked: #2A2C50;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    width: 393px;
    height: 852px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }

  /* Dense star field */
  .stars { position: absolute; inset: 0; z-index: 0; }
  @keyframes twinkle {
    0%, 100% { opacity: 0.1; }
    50% { opacity: 0.7; }
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite;
  }

  /* Nebula clouds */
  .nebula {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    z-index: 0;
  }
  .neb-1 { top: 100px; left: -60px; width: 200px; height: 200px; background: var(--violet); opacity: 0.06; }
  .neb-2 { top: 350px; right: -80px; width: 180px; height: 180px; background: var(--cyan); opacity: 0.04; }
  .neb-3 { bottom: 150px; left: 50px; width: 150px; height: 150px; background: #FF6B9D; opacity: 0.03; }

  /* Distant gas giant */
  .gas-giant {
    position: absolute;
    bottom: 100px;
    right: -20px;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 40%, #2A2050 0%, #151030 60%, #0A0B1E 100%);
    opacity: 0.25;
    z-index: 0;
  }
  .gas-giant::after {
    content: '';
    position: absolute;
    top: 38%;
    left: -15px;
    right: -15px;
    height: 6px;
    background: linear-gradient(to right, transparent, rgba(167, 139, 250, 0.1), rgba(92, 224, 216, 0.08), transparent);
    transform: rotate(-8deg);
    border-radius: 50%;
  }

  /* Header */
  .header {
    position: relative;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 56px 20px 16px;
    background: linear-gradient(to bottom, rgba(17, 19, 40, 0.95) 0%, transparent 100%);
  }

  .back-btn svg {
    width: 24px; height: 24px;
    fill: none; stroke: var(--text); stroke-width: 2;
    stroke-linecap: round; stroke-linejoin: round;
  }

  .header-title {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--gold);
  }

  .star-count {
    display: flex;
    align-items: center;
    gap: 4px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: 14px;
    color: var(--gold);
  }

  /* Scrollable path area */
  .path-area {
    position: relative;
    z-index: 10;
    height: calc(100% - 180px);
    overflow-y: auto;
    padding: 20px 0;
    -webkit-overflow-scrolling: touch;
  }
  .path-area::-webkit-scrollbar { display: none; }

  .path-container {
    position: relative;
    width: 100%;
    min-height: 1200px;
    padding: 0 30px;
  }

  /* Dotted path line */
  .path-line {
    position: absolute;
    top: 0;
    left: 50%;
    width: 2px;
    height: 100%;
    z-index: 1;
  }

  /* SVG zigzag path */
  .path-svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
  }

  /* Level nodes */
  .level-node {
    position: absolute;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .level-node:hover { transform: scale(1.1); }

  .planet-node {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: 14px;
    position: relative;
  }

  /* Completed nodes */
  .planet-node.completed {
    background: radial-gradient(circle at 35% 35%, #FFE699 0%, var(--gold) 60%, #D4A830 100%);
    color: var(--bg);
    box-shadow: 0 0 16px 4px rgba(255, 214, 102, 0.25), 0 0 32px 8px rgba(255, 214, 102, 0.1);
  }

  .planet-node.completed::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1.5px solid rgba(255, 214, 102, 0.3);
  }

  /* Current node */
  @keyframes current-pulse {
    0%, 100% { box-shadow: 0 0 16px 4px rgba(255, 214, 102, 0.3), 0 0 32px 8px rgba(255, 214, 102, 0.15); }
    50% { box-shadow: 0 0 24px 8px rgba(255, 214, 102, 0.5), 0 0 48px 16px rgba(255, 214, 102, 0.25); }
  }

  .planet-node.current {
    width: 52px;
    height: 52px;
    font-size: 16px;
    font-weight: 700;
    background: radial-gradient(circle at 35% 35%, #FFF0C0 0%, var(--gold) 50%, #D4A830 100%);
    color: var(--bg);
    animation: current-pulse 2.5s ease-in-out infinite;
  }

  .planet-node.current::after {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid rgba(255, 214, 102, 0.4);
  }

  /* Locked nodes */
  .planet-node.locked {
    background: radial-gradient(circle at 35% 35%, #3A3C60 0%, var(--locked) 60%, #1A1C3A 100%);
    color: #4A4C70;
    border: 1px solid rgba(42, 44, 80, 0.5);
  }

  .lock-icon {
    font-size: 12px;
    position: absolute;
    bottom: -2px;
    right: -2px;
    opacity: 0.5;
  }

  /* Stars below completed nodes */
  .mini-stars {
    display: flex;
    gap: 2px;
  }
  .mini-star {
    font-size: 10px;
    color: var(--gold);
  }
  .mini-star.empty {
    color: #2A2C50;
  }

  /* Milestone marker */
  .milestone {
    position: absolute;
    z-index: 4;
    font-family: 'Quicksand', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
    opacity: 0.6;
  }

  /* Decorative elements */
  .deco-comet {
    position: absolute;
    z-index: 3;
    width: 30px;
    height: 2px;
    border-radius: 1px;
    background: linear-gradient(to right, transparent, rgba(255, 214, 102, 0.3));
    transform: rotate(-25deg);
  }

  .deco-galaxy {
    position: absolute;
    z-index: 3;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(167, 139, 250, 0.15) 0%, transparent 70%);
  }

  /* Bottom nav */
  .bottom-nav {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    height: 80px;
    background: var(--surface);
    border-top: 1px solid rgba(30, 34, 85, 0.5);
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding-bottom: 16px;
    z-index: 20;
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
  }
  .nav-item svg {
    width: 24px; height: 24px;
    fill: none; stroke-width: 2;
    stroke-linecap: round; stroke-linejoin: round;
  }
  .nav-item.active svg { stroke: var(--gold); }
  .nav-item.inactive svg { stroke: var(--text-dim); }
  .nav-label { font-size: 10px; font-weight: 500; }
  .nav-item.active .nav-label { color: var(--gold); }
  .nav-item.inactive .nav-label { color: var(--text-dim); }
</style>
</head>
